name: Deploy to CloudPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export PATH=$PATH:/home/adwitiyah/.nvm/versions/node/v22.22.3/bin

            cd /home/adwitiyah/htdocs/adwitiyah.xyz

            git pull origin main

            npm ci

            npm run build

            pm2 reload all